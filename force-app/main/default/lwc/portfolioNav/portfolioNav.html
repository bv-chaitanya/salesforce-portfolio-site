<template>
    <div lwc:if={hasProfile} class="stack">
        <button
            lwc:if={profileName}
            class={nameChipClass}
            type="button"
            title="Back to top"
            onclick={handleNameClick}
        >{profileName}</button>
        <nav class="dock" aria-label="Portfolio sections">
            <span class="indicator" aria-hidden="true"></span>
            <template for:each={items} for:item="item">
                <button
                    key={item.id}
                    class={item.cls}
                    type="button"
                    data-id={item.id}
                    onclick={handleClick}
                >{item.label}</button>
            </template>
        </nav>
    </div>
</template>
