<template>
    <section class="hero">
        <template lwc:if={isReady}>
        <div class="hero-band">
            <div class="avatar">
                <template lwc:if={showPhoto}>
                    <img
                        class="avatar-img"
                        src={profile.photoUrl}
                        alt={profile.fullName}
                        onerror={handlePhotoError}
                    />
                </template>
                <template lwc:else>
                    <span class="avatar-initials">{initials}</span>
                </template>
            </div>
            <h1 class="name">{profile.fullName}</h1>
            <p lwc:if={profile.headline} class="headline">{profile.headline}</p>
            <p lwc:if={profile.location} class="location">{profile.location}</p>
            <div class="links">
                <a lwc:if={mailtoHref} class="btn btn-solid" href={mailtoHref}>Email me</a>
                <a
                    lwc:if={profile.linkedInUrl}
                    class="btn btn-outline"
                    href={profile.linkedInUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                >LinkedIn</a>
            </div>
            <div lwc:if={profile.summary} class="summary">
                <lightning-formatted-rich-text value={profile.summary}></lightning-formatted-rich-text>
            </div>
        </div>
        </template>
        <p lwc:elseif={isError} class="state">Profile is unavailable right now.</p>
        <template lwc:elseif={isEmpty}>
            <div class="hero-band empty-band">
                <h1 class="empty-title">No active profiles</h1>
                <p class="empty-sub">This portfolio is currently unpublished — check back soon.</p>
            </div>
        </template>
    </section>
</template>
