<template>
    <div lwc:if={siteHasProfiles} class="wrap">
        <div class={experiencePanelClass} data-tab="experience" role="region" aria-label="Experience">
            <c-portfolio-experience></c-portfolio-experience>
        </div>
        <div class={skillsPanelClass} data-tab="skills" role="region" aria-label="Skills">
            <c-portfolio-skills></c-portfolio-skills>
        </div>
        <div class={certificationsPanelClass} data-tab="certifications" role="region" aria-label="Certifications">
            <c-portfolio-certifications></c-portfolio-certifications>
        </div>
        <div class={educationPanelClass} data-tab="education" role="region" aria-label="Education and Awards">
            <c-portfolio-education></c-portfolio-education>
            <c-portfolio-awards></c-portfolio-awards>
        </div>
        <div class={morePanelClass} data-tab="more" role="region" aria-label="More">
            <c-portfolio-items></c-portfolio-items>
        </div>

        <nav lwc:if={showPagerNav} class="pager-nav" aria-label="Section pager">
            <button lwc:if={prevLabel} class="pager-btn" type="button" onclick={handlePrev}>
                ← {prevLabel}
            </button>
            <span class="pager-spacer"></span>
            <button lwc:if={nextLabel} class="pager-btn pager-next" type="button" onclick={handleNext}>
                {nextLabel} →
            </button>
        </nav>
    </div>
</template>
