<template>
    <section lwc:if={siteHasProfiles} class="section">
        <h2 lwc:if={showTitle} class="section-title">Skills</h2>
        <template lwc:if={isReady}>
            <div class="grid">
                <template for:each={groups} for:item="group">
                    <div key={group.key} class="group">
                        <h3 class="group-title">{group.category}</h3>
                        <div class="chips">
                            <template for:each={group.skills} for:item="skill">
                                <span key={skill.key} class="chip">{skill.label}</span>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>
        <p lwc:elseif={isError} class="state">Skills are unavailable right now.</p>
        <p lwc:elseif={isEmpty} class="state">No skills published yet.</p>
    </section>
</template>
